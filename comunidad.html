<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Comunidad RoboCoach Academy: El foro técnico definitivo para competidores VEX V5. Comparte código, resolve dudas y mejora tus trayectorias.">
    <title>Comunidad V5 Pro | RoboCoach Academy</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root {
            --sidebar-width: 280px;
        }
        body {
            background: #0F0F0F;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        .app-container {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }
        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            background: #141414;
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            z-index: 10;
        }
        .category-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 0.8rem 1rem;
            border-radius: 8px;
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition);
            margin-bottom: 0.2rem;
            border: 1px solid transparent;
        }
        .category-item:hover {
            background: rgba(255,255,255,0.05);
            color: white;
        }
        .category-item.active {
            background: rgba(0, 163, 224, 0.1);
            color: var(--accent-blue);
            border-color: rgba(0, 163, 224, 0.2);
        }
        .category-item svg { width: 20px; height: 20px; }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #0A0A0A;
            overflow-y: auto;
            position: relative;
        }
        .portal-header {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15,15,15,0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 5;
        }
        .feed-container {
            max-width: 800px;
            margin: 2rem auto;
            width: 100%;
            padding: 0 1rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        /* Post Form */
        .post-composer {
            background: #1A1A1A;
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }
        .composer-textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: white;
            font-size: 1.1rem;
            resize: none;
            margin-bottom: 1rem;
            min-height: 60px;
        }
        .composer-textarea:focus { outline: none; }
        .composer-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--glass-border);
            padding-top: 1rem;
        }

        /* Mobile */
        @media (max-width: 768px) {
            .sidebar {
                position: absolute;
                left: -100%;
                top: 0;
                bottom: 0;
                transition: var(--transition);
            }
            .sidebar.open { left: 0; }
            .app-container { flex-direction: column; }
        }
    </style>
</head>
<body>
    <header style="position:static; padding: 1rem 0;">
        <div class="container" style="display:flex; justify-content:space-between; align-items:center;">
            <div class="logo"><span>ROBOCOACH</span> ACADEMY</div>
            <a href="index.html" class="btn-secondary" style="padding: 0.5rem 1rem; font-size: 0.8rem; display:flex; align-items:center; gap:0.5rem;">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
                Volver a la Academia
            </a>
        </div>
    </header>

    <div class="app-container">
        <!-- Sidebar Categorías -->
        <aside class="sidebar" id="sidebar">
            <h3 style="font-size:0.8rem; color:var(--text-muted); text-transform:uppercase; margin-bottom:1.5rem; letter-spacing:1px;">Categorías</h3>
            <div class="category-item active" onclick="setPortalFilter('All')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
                Todo el Feed
            </div>
            <div class="category-item" onclick="setPortalFilter('Código')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
                Código V5
            </div>
            <div class="category-item" onclick="setPortalFilter('Soporte')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg>
                Soporte Técnico
            </div>
            <div class="category-item" onclick="setPortalFilter('Competencia')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"></path><line x1="4" y1="22" x2="4" y2="15"></line></svg>
                Eventos y Copas
            </div>
            <div class="category-item" onclick="setPortalFilter('General')">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
                General
            </div>

            <div style="margin-top:auto; padding-top:1rem; border-top:1px solid var(--glass-border);">
                <div id="portalUserCard" style="display:flex; align-items:center; gap:0.8rem;">
                    <!-- User Avatar dynamically injected -->
                </div>
            </div>
        </aside>

        <!-- Main Feed -->
        <main class="main-content">
            <div class="portal-header">
                <h1 id="portalTitle" style="font-size:1.4rem; margin:0;">Feed Comunitario</h1>
                <div id="portalStatus" style="font-size:0.8rem; color:var(--accent-blue); font-weight:700;">LIVE</div>
            </div>

            <div class="feed-container">
                <!-- Composer -->
                <div class="post-composer" id="postComposer">
                    <form onsubmit="submitPortalPost(event)">
                        <textarea class="composer-textarea" id="portalInput" placeholder="¿Qué tienes en mente para la comunidad V5?" required></textarea>
                        <div class="composer-footer">
                            <div style="display:flex; gap:0.5rem;">
                                <select id="portalCategory" style="background:#252525; color:white; border:1px solid var(--glass-border); padding:0.4rem; border-radius:6px; font-size:0.8rem;">
                                    <option value="General">Discusión General</option>
                                    <option value="Código">Código V5</option>
                                    <option value="Soporte">Soporte Técnico</option>
                                    <option value="Competencia">Eventos</option>
                                </select>
                            </div>
                            <button type="submit" class="btn-primary" style="padding:0.6rem 1.8rem;">Publicar</button>
                        </div>
                    </form>
                </div>

                <!-- Feed -->
                <div id="portalFeed">
                    <!-- Posts load here -->
                </div>
            </div>
        </main>
    </div>

    <!-- SUPABASE -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-client.js"></script>
    <script src="comunidad.js"></script>
    <script>
        // Basic Navigation for Mobile
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }
    </script>
</body>
</html>
