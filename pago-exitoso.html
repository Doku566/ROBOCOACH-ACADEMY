<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Pago Exitoso! | RoboCoach Academy</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0A0A0A;
            --vex-red: #E31B23;
            --accent-blue: #00B4D8;
            --text-main: #FFFFFF;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .container {
            text-align: center;
            padding: 2.5rem;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            max-width: 550px;
            width: 90%;
            backdrop-filter: blur(20px);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .icon {
            font-size: 5rem;
            color: #00C853;
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 0 15px rgba(0, 200, 83, 0.3));
        }
        h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2.2rem;
            margin-bottom: 1rem;
            letter-spacing: -1px;
        }
        p {
            color: #A0A0A0;
            line-height: 1.6;
            margin-bottom: 2rem;
        }
        .badge {
            background: rgba(0, 180, 216, 0.1);
            color: var(--accent-blue);
            padding: 0.8rem 1.2rem;
            border-radius: 12px;
            display: inline-block;
            margin-bottom: 2rem;
            font-weight: 600;
            border: 1px solid rgba(0, 180, 216, 0.2);
        }
        .btn {
            background: var(--vex-red);
            color: white;
            text-decoration: none;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-weight: 700;
            display: inline-block;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(227, 27, 35, 0.3);
        }
        .btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">
            <svg viewBox="0 0 24 24" width="80" height="80" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6M18 9h1.5a2.5 2.5 0 0 0 0-5H18M4 22h16M10 14.66V17c0 .55.45 1 1 1h2c.55 0 1-.45 1-1v-2.34M12 4v10.66M8 4h8v9a4 4 0 0 1-8 0V4z"></path></svg>
        </div>
        <h1>¡Licencia Activada!</h1>
        <div id="instName" class="badge" style="display:none">Cargando...</div>
        <p id="successMsg">
            El pago se ha procesado correctamente. Ya puedes acceder a todo el material premium de la academia.
        </p>
        <p id="subMsg" style="font-size: 0.85rem; background: rgba(0,0,0,0.3); padding: 1rem; border-radius: 12px; margin-bottom: 2rem;">
            Se ha enviado un recibo a tu correo.
        </p>
        <a href="/" class="btn">Volver a la Academia</a>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const type = params.get('type');
        const inst = params.get('inst');
        const titleEl = document.querySelector('h1');
        const badgeEl = document.getElementById('instName');
        const msgEl = document.getElementById('successMsg');
        const subMsgEl = document.getElementById('subMsg');

        if (type === 'b2b') {
            titleEl.innerText = "¡Licencia B2B Activada!";
            badgeEl.style.display = 'inline-block';
            badgeEl.innerText = inst ? decodeURIComponent(inst) : 'Institución Registrada';
            msgEl.innerText = "El pago se ha procesado correctamente. Los miembros de tu institución ya pueden registrarse usando su correo institucional para obtener acceso Premium automático.";
            subMsgEl.innerText = "Se ha enviado un recibo y los detalles de la licencia al correo de contacto proporcionado.";
        } else {
            titleEl.innerText = "¡Ya eres PRO!";
            badgeEl.style.display = 'inline-block';
            badgeEl.innerText = "Acceso Individual Activado";
            badgeEl.style.background = "rgba(227, 27, 35, 0.1)";
            badgeEl.style.color = "var(--vex-red)";
            badgeEl.style.borderColor = "rgba(227, 27, 35, 0.2)";
            msgEl.innerText = "¡Felicidades! Tu cuenta ha sido mejorada al nivel PRO. Ya tienes acceso a todos los módulos avanzados, exámenes y certificados.";
            subMsgEl.innerText = "Reinicia la academia para ver los cambios aplicados en tu perfil.";
        }
    </script>
</body>
</html>
